{% extends "base.html" %}
{% block content %}
<style>
    .form-container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--clay); }
    .form-title { color: var(--navy); text-align: center; margin-bottom: 25px; }
    .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full-width { grid-column: span 2; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--navy); }
    /* Stylování políček formuláře */
    input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
    input:focus, select:focus { outline: none; border-color: var(--clay); box-shadow: 0 0 5px rgba(211, 84, 0, 0.2); }
    .btn-submit { background: var(--win); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: 0.3s; }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
</style>

<div class="form-container">
    <h2 class="form-title">🎾 Zadat výsledek zápasu</h2>
    <form method="post">
        {% csrf_token %}
        <div class="grid-form">
            <div class="form-group">
                <label>Domácí (řádek)</label>
                {{ form.hrac_domaci }}
            </div>
            <div class="form-group">
                <label>Hosté (sloupec)</label>
                {{ form.hrac_hoste }}
            </div>
            <div class="form-group">
                <label>1. Set</label>
                {{ form.set1 }}
            </div>
            <div class="form-group">
                <label>2. Set</label>
                {{ form.set2 }}
            </div>
            <div class="form-group">
                <label>3. Set (pokud byl)</label>
                {{ form.set3 }}
				<p style="font-size: 0.8rem; color: #666;">
					ℹ️ Třetí set se může hrát jako Supertiebreak (vítězi jde do skóre +1 bod).
				</p>
            </div>
            <div class="form-group">
                <label>Datum</label>
                {{ form.datum }}
            </div>
            <div class="form-group full-width">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    {{ form.odehrano }} <span>Zápas je odehrán (zobrazit v tabulce)</span>
                </label>
            </div>
        </div>
        <button type="submit" class="btn-submit">Uložit výsledek</button>
    </form>
</div>
{% endblock %}
