{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #e74c3c;">
    <h2 style="color: #c0392b;">⚠️ Opravdu smazat?</h2>
    <p style="margin: 20px 0; font-size: 1.1rem;">Chystáte se trvale odstranit <strong>{{ objekt }}</strong>.</p>
    
    <form method="post">
    {% csrf_token %}
    <p>Opravdu chcete smazat {{ objekt }}?</p>
    
    <button type="submit">Potvrdit smazání</button>
    
    <a href="{% url zpet_url_name %}">Zrušit</a>
</form>
</div>
{% endblock %}
