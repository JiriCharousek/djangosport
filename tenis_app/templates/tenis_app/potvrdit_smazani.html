{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #e74c3c;">
    <h2 style="color: #c0392b;">⚠️ Opravdu smazat?</h2>
    
    <p style="margin: 20px 0; font-size: 1.1rem;">
        Chystáte se trvale odstranit výsledek:<br>
        <strong>{{ zapas.hrac_domaci }} vs. {{ zapas.hrac_hoste }}</strong>
    </p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">
            Potvrdit smazání
        </button>
        
        <div style="margin-top: 15px;">
            <a href="{% url 'tenis_app:detail_souteze' zapas.soutez.slug %}" style="color: #7f8c8d; text-decoration: none;">
                Zrušit a jít zpět
            </a>
        </div>
    </form>
</div>
{% endblock %}
