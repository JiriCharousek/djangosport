<h2>Nastavení nového hesla</h2>

{% if validlink %}
    <p>Zadejte prosím své nové heslo dvakrát pro kontrolu.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Uložit nové heslo</button>
    </form>
{% else %}
    <p style="color: red;">Odkaz pro reset hesla je neplatný nebo již vypršela jeho platnost.</p>
    <a href="{% url 'password_reset' %}">Zkusit znovu odeslat e-mail</a>
{% endif %}
